<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3PT Tracker V5</title>

<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <h2>Controls</h2>

    <div id="info">Zone: -</div>

    <button id="hit">TREFFER</button>
    <button id="miss">MISS</button>
    <button id="newSession">NEW SESSION</button>
    <button id="undo">UNDO</button>

    <hr/>

    <h3>Stats</h3>
    <div id="stats"></div>

    <h3>Days</h3>
    <div id="days"></div>
  </aside>

  <main class="main">
    <h1>Half Court Heatmap</h1>

    <div class="court-wrapper">
      <canvas id="court"></canvas>
    </div>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
