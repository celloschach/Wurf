<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3PT Heatmap Advanced</title>

<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <h2>Stats</h2>
    <div id="stats">-</div>

    <button id="hit">Treffer Mode</button>
    <button id="miss">Miss Mode</button>
    <button id="clear">Reset</button>
  </aside>

  <main class="main">

    <h1>Basketball Shot Heatmap</h1>

    <div class="court-wrapper">
      <canvas id="court"></canvas>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
