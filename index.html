<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3PT Tracker</title>

<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <h2>Tage</h2>
    <div id="days"></div>
  </aside>

  <main class="main">

    <header class="header">
      <h1>3PT Tracker</h1>
      <div id="dateLabel"></div>
    </header>

    <section class="stats">

      <div class="card">
        <h3>Session</h3>
        <div id="sessionStats">-</div>
      </div>

      <div class="card">
        <h3>Tag</h3>
        <div id="dayStats">-</div>
      </div>

      <div class="card">
        <h3>Gesamt</h3>
        <div id="totalStats">-</div>
      </div>

    </section>

    <section class="actions">

      <button id="hit">Treffer</button>
      <button id="miss">Fehlwurf</button>

      <button id="newSession">Neue Session</button>
      <button id="undo">Undo</button>

    </section>

    <section class="charts">

      <div class="chartBox">
        <h3>Session Verlauf</h3>
        <canvas id="sessionChart"></canvas>
      </div>

      <div class="chartBox">
        <h3>Tag Verlauf</h3>
        <canvas id="dayChart"></canvas>
      </div>

    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
